<!DOCTYPE html>
<html>
  <head>
    <title>DHS Publish</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="static/Logo-Dharma-Suci.png">
    <link rel="stylesheet" href="static/home.css">
  </head>
  <body>
    <!--Header-->
    <header>
      <div class="header">
        <div class = "home-button">
          <img class="home-button-img" src="static/Logo-Dharma-Suci.png" alt="!!!">
        </div>

        <!--Search Bar-->
        <div class="search-bar-div">
          <input class="search-bar" type="search" placeholder="Search"> 
          <button class= "search-icon-button">
            <img class="search-icon" src="https://www.svgrepo.com/show/356535/search-button.svg" alt="!!!">
          </button>
        </div>
        
        <!--File Upload and upload modal-->
        <button class="file-upload-button"  id="file-upload-button" type="button">
          <div class="file-upload-text">Upload</div>
            <img src="/static/upload-square-svgrepo-com.svg" alt="uploadimg" id="upload-icon">
        </button>
        
        <div id="upload-modal">
          <div id="upload-modal-box">
            <form action="/uploadfile/" method ="post" id='file-upload-logic' enctype="multipart/form-data">
              
              <input type="file" accept=".pdf,.doc,.docx,.txt,.odt" id="upload-file" name="file" multiple required>

              <div id="upload-title-style">
                <input type="text" id="upload-title" placeholder="Title" name="title" required>
              </div>
              
              <div id="upload-author-style">
                <input type="text" id="upload-author" placeholder="Author Name" name="author" required>                
              </div>


              
              <div id="upload-status"></div>
              <div id="submit-cancel-buttons">
                <button type="submit" id="submit-button">
                  Upload
                </button>
                <button type="button" id="close-modal">
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
        
          
        <div class="profile-picture" id="profile-picture-button">
          <img class="profile-picture-img" src="static/profilepicture.svg" alt="">
        </div>
      </div>
      <!--Menu below header-->
    <div class="menu">
        <button class="trending-button" id="trending-button">
          Trending
        </button>
        <button class="forms-button" id="forms-button">
          Forms
        </button>
    </div>
    </header>

    <!--All the files displayed that can be downloaded, the home page-->
    <main>
      <div class="main"> 
        <div class="files-grid" id="files-grid"> 

        </div>  
     </div>
    </main>
    <script src="static/home.js"></script>
  </body>
</html>
